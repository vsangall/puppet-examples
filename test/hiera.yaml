---
version: 5
defaults:
  data_hash: yaml_data

hierarchy:
  - name: "Test overrides"
    datadir: "/etc/puppetlabs/code/environments/production/data"
    path: "common.yaml"

  - name: "Module data - OS family"
    datadir: "/etc/puppetlabs/code/environments/production/modules/%{module_name}/data"
    path: "os/%{facts.os.family}.yaml"

  - name: "Module data - common"
    datadir: "/etc/puppetlabs/code/environments/production/modules/%{module_name}/data"
    path: "common.yaml"
